<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Utilidades</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Panel de Utilidades</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema">
                <span class="theme-icon">🌙</span>
            </button>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="currency">Conversor de Monedas</button>
            <button class="tab-btn" data-tab="bmi">Calculadora IMC</button>
            <button class="tab-btn" data-tab="todo">Lista de Tareas</button>
            <button class="tab-btn" data-tab="password">Generador de Contraseñas</button>
            <button class="tab-btn" data-tab="units">Conversor de Unidades</button>
        </nav>

        <main>
            <section id="currency" class="tab-content active">
                <h2>Conversor de Monedas</h2>
                <div class="utility-card">
                    <form id="currency-form">
                        <div class="form-group">
                            <label for="amount">Monto:</label>
                            <input type="number" id="amount" min="0" step="0.01" required placeholder="Ingrese el monto">
                            <span class="error-message" id="amount-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="from-currency">De:</label>
                            <select id="from-currency" required>
                                <option value="USD">USD - Dólar Estadounidense</option>
                                <option value="EUR">EUR - Euro</option>
                                <option value="GBP">GBP - Libra Esterlina</option>
                                <option value="JPY">JPY - Yen Japonés</option>
                                <option value="MXN">MXN - Peso Mexicano</option>
                                <option value="ARS">ARS - Peso Argentino</option>
                                <option value="COP">COP - Peso Colombiano</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="to-currency">A:</label>
                            <select id="to-currency" required>
                                <option value="USD">USD - Dólar Estadounidense</option>
                                <option value="EUR">EUR - Euro</option>
                                <option value="GBP">GBP - Libra Esterlina</option>
                                <option value="JPY">JPY - Yen Japonés</option>
                                <option value="MXN">MXN - Peso Mexicano</option>
                                <option value="ARS">ARS - Peso Argentino</option>
                                <option value="COP">COP - Peso Colombiano</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary">Convertir</button>
                    </form>
                    <div id="currency-result" class="result"></div>
                </div>
            </section>

            <section id="bmi" class="tab-content">
                <h2>Calculadora de IMC</h2>
                <div class="utility-card">
                    <form id="bmi-form">
                        <div class="form-group">
                            <label for="weight">Peso (kg):</label>
                            <input type="number" id="weight" min="1" step="0.1" required placeholder="Ej: 70">
                            <span class="error-message" id="weight-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="height">Altura (cm):</label>
                            <input type="number" id="height" min="1" step="0.1" required placeholder="Ej: 175">
                            <span class="error-message" id="height-error"></span>
                        </div>
                        <button type="submit" class="btn-primary">Calcular IMC</button>
                    </form>
                    <div id="bmi-result" class="result"></div>
                </div>
            </section>

            <section id="todo" class="tab-content">
                <h2>Lista de Tareas</h2>
                <div class="utility-card">
                    <form id="todo-form">
                        <div class="form-group">
                            <label for="todo-input">Nueva tarea:</label>
                            <input type="text" id="todo-input" required placeholder="Ingrese una tarea" maxlength="100">
                            <span class="error-message" id="todo-error"></span>
                        </div>
                        <button type="submit" class="btn-primary">Agregar Tarea</button>
                    </form>
                    <ul id="todo-list" class="todo-list"></ul>
                    <button id="clear-completed" class="btn-secondary">Limpiar Completadas</button>
                </div>
            </section>

            <section id="password" class="tab-content">
                <h2>Generador de Contraseñas</h2>
                <div class="utility-card">
                    <form id="password-form">
                        <div class="form-group">
                            <label for="password-length">Longitud:</label>
                            <input type="number" id="password-length" min="8" max="64" value="16" required>
                            <span class="error-message" id="password-length-error"></span>
                        </div>
                        <div class="form-group checkbox-group">
                            <label>
                                <input type="checkbox" id="include-uppercase" checked>
                                Incluir mayúsculas (A-Z)
                            </label>
                            <label>
                                <input type="checkbox" id="include-lowercase" checked>
                                Incluir minúsculas (a-z)
                            </label>
                            <label>
                                <input type="checkbox" id="include-numbers" checked>
                                Incluir números (0-9)
                            </label>
                            <label>
                                <input type="checkbox" id="include-symbols" checked>
                                Incluir símbolos (!@#$%^&*)
                            </label>
                        </div>
                        <button type="submit" class="btn-primary">Generar Contraseña</button>
                    </form>
                    <div id="password-result" class="result">
                        <div class="password-display">
                            <input type="text" id="generated-password" readonly>
                            <button id="copy-password" class="btn-copy">Copiar</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="units" class="tab-content">
                <h2>Conversor de Unidades</h2>
                <div class="utility-card">
                    <div class="form-group">
                        <label for="unit-type">Tipo de conversión:</label>
                        <select id="unit-type" required>
                            <option value="length">Longitud</option>
                            <option value="weight">Peso</option>
                            <option value="temperature">Temperatura</option>
                        </select>
                    </div>
                    <form id="units-form">
                        <div class="form-group">
                            <label for="unit-value">Valor:</label>
                            <input type="number" id="unit-value" step="0.001" required placeholder="Ingrese el valor">
                            <span class="error-message" id="unit-value-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="from-unit">De:</label>
                            <select id="from-unit" required></select>
                        </div>
                        <div class="form-group">
                            <label for="to-unit">A:</label>
                            <select id="to-unit" required></select>
                        </div>
                        <button type="submit" class="btn-primary">Convertir</button>
                    </form>
                    <div id="units-result" class="result"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>Panel de Utilidades &copy; 2026</p>
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script src="js/currency-converter.js"></script>
    <script src="js/bmi-calculator.js"></script>
    <script src="js/todo-list.js"></script>
    <script src="js/password-generator.js"></script>
    <script src="js/unit-converter.js"></script>
</body>
</html>
